name: CI
on: [push, pull_request]
# OIDC (Azure login, cosign keyless) and SARIF upload can only be granted by the
# caller — GitHub will not let the reusable workflow elevate these itself.
permissions:
  contents: read
  id-token: write
  security-events: write
jobs:
  golden-path:
    # TODO: pin to platform-golden-path's main SHA once the repo is on GitHub.
    uses: frhnardi/platform-golden-path/.github/workflows/golden-path.yml@<PIN-TO-COMMIT-SHA>
    with:
      service-name: sample-service
    secrets: inherit
